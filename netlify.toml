# Despliegue del frontend (PWA) en Netlify.
# Conecta este repo en Netlify. La configuración monorepo:

[build]
  base = "."
  command = "npm install && npm run build --workspace=@bismark/web"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "20"
  # Define VITE_API_URL en el panel de Netlify (apuntando a tu API en Railway),
  # por ejemplo: https://bismark-api.up.railway.app
  # y VITE_USE_SUBDOMAINS=true / VITE_ROOT_DOMAIN=bismark.com si usas subdominios.

# Vista previa de enlaces (Open Graph dinámico): la edge function `og` inyecta
# meta tags por rifa para los crawlers de WhatsApp/Facebook. Los usuarios reales
# pasan directo a la SPA. Corre antes del fallback de abajo.
[[edge_functions]]
  function = "og"
  path = "/"
[[edge_functions]]
  function = "og"
  path = "/r/*"
[[edge_functions]]
  function = "og"
  path = "/e*"

# SPA fallback: todas las rutas sirven index.html (React Router).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cabeceras de seguridad.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # CSP: ajusta `connect-src` al host EXACTO de tu API si no es *.bismark.com.
    # Incluimos *.up.railway.app (transición) + PostHog + Sentry.
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; img-src 'self' data: https:; script-src 'self' https://*.posthog.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; worker-src 'self'; manifest-src 'self'; connect-src 'self' https://*.bismark.com https://*.up.railway.app https://*.posthog.com https://us.i.posthog.com https://*.ingest.sentry.io"

# El service worker no debe cachearse de forma agresiva.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
