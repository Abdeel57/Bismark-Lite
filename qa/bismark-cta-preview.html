<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview — Logo Bismark</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { brand: { DEFAULT: '#1A4DFF', mint: '#4DFFA3', ink: '#0A0A0A', dark: '#0F1116' } },
      fontFamily: { sans: ['Inter','sans-serif'], display: ['"Bricolage Grotesque"','serif'], ticket: ['"Space Mono"','monospace'] },
    } } };
  </script>
  <style> body { font-family: Inter, system-ui, sans-serif; } </style>
</head>
<body class="bg-[#eef1f8]">
  <!-- 1) Header oscuro estilo landing: logo BLANCO (invert) -->
  <header class="border-b border-white/10 bg-brand-ink">
    <div class="mx-auto flex h-16 max-w-2xl items-center justify-between px-4">
      <div class="flex items-center gap-2 font-display text-xl font-extrabold text-white">
        <img src="../apps/web/src/assets/bismark-logo.png" class="h-8 w-8 object-contain invert" alt="Bismark" />
        Bismark
      </div>
      <span class="rounded-full bg-brand px-4 py-1.5 text-sm font-semibold text-white">Crear mi página</span>
    </div>
  </header>

  <!-- 2) Header claro estilo páginas internas: logo NEGRO -->
  <header class="border-b border-zinc-200 bg-white">
    <div class="mx-auto flex h-14 max-w-2xl items-center justify-between px-4">
      <div class="flex items-center gap-2 font-display text-xl font-extrabold text-zinc-900">
        <img src="../apps/web/src/assets/bismark-logo.png" class="h-8 w-8 object-contain" alt="Bismark" />
        Bismark
      </div>
      <span class="text-sm text-zinc-400">☾</span>
    </div>
  </header>

  <div class="mx-auto max-w-2xl px-4 pb-14 pt-10 text-center">
    <p class="mb-6 text-xs font-bold uppercase tracking-widest text-zinc-400">… contenido de la rifa …</p>
    <!-- Impulsado por (pequeño, logo negro) -->
    <a href="#" class="inline-flex items-center gap-1.5 text-xs text-zinc-400">
      <img src="../apps/web/src/assets/bismark-logo.png" class="h-4 w-4 object-contain" alt="Bismark" />
      Impulsado por Bismark
    </a>
  </div>

  <!-- 3) Banda de cierre BismarkCta: logo BLANCO (invert) -->
  <section class="relative isolate w-full overflow-hidden border-t border-white/10 bg-brand-dark px-6 py-12 text-center">
    <div aria-hidden class="pointer-events-none absolute inset-x-0 bottom-0 -z-10 h-1/2 opacity-40" style="background: radial-gradient(55% 100% at 50% 100%, rgba(26,77,255,0.3), transparent 75%)"></div>
    <div class="mx-auto max-w-md">
      <div class="mb-3 inline-flex items-center gap-2">
        <img src="../apps/web/src/assets/bismark-logo.png" class="h-7 w-7 object-contain invert" alt="Bismark" />
        <span class="font-display text-lg font-bold uppercase tracking-[0.22em] text-white">BISMARK</span>
      </div>
      <h2 class="font-display text-xl font-bold tracking-tight text-white sm:text-2xl">Empieza a rifar aquí</h2>
      <p class="mx-auto mt-1.5 max-w-sm text-sm leading-relaxed text-white/55">
        Crea tus propias rifas digitales: cobros en línea, boletos con QR y sorteos transparentes.
      </p>
      <a href="#" class="group mt-5 inline-flex items-center gap-2 rounded-full border border-white/25 bg-white/10 px-6 py-2.5 text-sm font-semibold text-white">
        Conoce Bismark <span>→</span>
      </a>
      <p class="mt-6 font-ticket text-[10px] uppercase tracking-[0.3em] text-white/30">Impulsado por Bismark</p>
    </div>
  </section>
</body>
</html>
